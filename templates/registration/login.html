{% extends 'base.html' %}
{% block title %}Sign In — NEXUS{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:440px">
  <div class="text-center mb-4">
    <h1 style="font-size:1.8rem;font-weight:800">Welcome Back</h1>
    <p class="text-muted">Sign in to your NEXUS account</p>
  </div>
  <div class="checkout-card">
    <form method="POST">
      {% csrf_token %}
      {% if form.errors %}<div class="alert alert-danger">Invalid username or password. Please try again.</div>{% endif %}
      <div class="mb-3"><label class="form-label fw-semibold small">Username</label><input type="text" name="username" class="form-control" placeholder="Your username" autofocus /></div>
      <div class="mb-3"><label class="form-label fw-semibold small">Password</label><input type="password" name="password" class="form-control" placeholder="Your password" /></div>
      <input type="hidden" name="next" value="{{ next }}" />
      <button type="submit" class="btn-primary-custom w-100 mt-2" style="justify-content:center;padding:14px">Sign In</button>
    </form>
    <p class="text-center mt-3 mb-0 small text-muted">Don't have an account? <a href="{% url 'accounts:register' %}" class="fw-semibold">Create one</a></p>
  </div>
</div>
{% endblock %}
